- name: 基本設定
  hosts: "sh"
  become: yes
  tasks:
    - name: すべてのパッケージを最新にする
      ansible.builtin.apt:
        name: "*"
        state: latest
    - name: 必要なパッケージをインストールする
      ansible.builtin.apt:
        name:
          - aria2
          - wget
          - curl
          - keepalived
        state: present

- name: keepalived で sh 向け vip を設定する
  hosts: "sh"
  become: yes
  vars:
    vip_address: 192.168.30.100/24
    base_priority: 200
    priority_step: 10
  handlers:
    - name: Restart keepalived
      service:
        name: keepalived
        state: restarted
  tasks:
    - name: hosts.yaml に記述されている順番で VRRP の priority を計算する
      set_fact:
        node_priority: "{{ base_priority - (groups['sh'].index(inventory_hostname) * priority_step) }}"
    
    - name: keepalived 向け config を生成して配置する
      template:
        src: ../svc/keepalived/keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: 0644
      notify: Restart keepalived

- name: Docker で構成される各サービスを配置
  hosts: "sh"
  become: yes
  tasks:
    - name: サービス定義ファイルを配置する
      ansible.builtin.copy:
        src: ../svc
        dest: /opt/
        owner: root
        group: root
        mode: '0755'

    - name: 53/udp の使用状況を確認する
      ansible.builtin.command: ss -Hlun sport = :53
      register: udp53_listeners
      changed_when: false
      failed_when: false

    - name: 53/udp が空なら systemd-resolved を一時的に有効化して起動する
      ansible.builtin.systemd:
        name: systemd-resolved
        enabled: yes
        state: started
      failed_when: false
      when:
        - (udp53_listeners.stdout | trim) == ""

    - name: /etc/resolv.conf を一旦削除する（symlink 対策）
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent
        force: yes
      when:
        - (udp53_listeners.stdout | trim) == ""

    - name: /etc/resolv.conf を nameserver 1.1.1.1 に向ける
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 1.1.1.1
        owner: root
        group: root
        mode: '0644'
      when:
        - (udp53_listeners.stdout | trim) == ""

    - name: coredns のイメージを pull する
      community.docker.docker_compose_v2_pull:
        project_src: /opt/svc/coredns

    - name: chrony を起動する
      community.docker.docker_compose_v2:
        project_src: /opt/svc/chrony
      register: output
    
    - name: tftpd をビルドする
      community.docker.docker_compose_v2:
        project_src: /opt/svc/tftpd
        state: present
        build: always

    - name: netboot.xyz 配布用ディレクトリを作成する
      ansible.builtin.file:
        path: /opt/svc/tftpd/data
        state: directory
        owner: root
        group: root
        mode: '0755'
      when:
        - (tftpd_netboot_xyz_enable | default(false) | bool) or (httpboot_netboot_xyz_enable | default(false) | bool)

    - name: netboot.xyz のブートローダを配置する
      ansible.builtin.get_url:
        url: "{{ (tftpd_netboot_xyz_download_base_url | default('https://boot.netboot.xyz/ipxe')) ~ '/' ~ item }}"
        dest: "/opt/svc/tftpd/data/{{ item }}"
        owner: root
        group: root
        mode: '0644'
      loop: "{{ tftpd_netboot_xyz_bootloaders | default(['netboot.xyz.kpxe', 'netboot.xyz.efi', 'netboot.xyz-arm64.efi', 'netboot.xyz-snponly.efi', 'netboot.xyz-arm64-snponly.efi']) }}"
      when:
        - (tftpd_netboot_xyz_enable | default(false) | bool) or (httpboot_netboot_xyz_enable | default(false) | bool)

    - name: tftpd を起動する
      community.docker.docker_compose_v2:
        project_src: /opt/svc/tftpd
      register: output

    - name: httpboot のイメージを pull する
      community.docker.docker_compose_v2_pull:
        project_src: /opt/svc/httpboot
      when:
        - httpboot_netboot_xyz_enable | default(false) | bool

    - name: httpboot を起動する
      community.docker.docker_compose_v2:
        project_src: /opt/svc/httpboot
      register: output
      when:
        - httpboot_netboot_xyz_enable | default(false) | bool

- name: Kea DHCPv4 を hot-standby で構成する
  hosts: "sh"
  become: yes
  handlers:
    - name: Restart kea-dhcp4
      community.docker.docker_compose_v2:
        project_src: /opt/svc/kea
        state: restarted
  tasks:
    - name: Kea DHCPv4 の有効化条件を確認する
      ansible.builtin.assert:
        that:
          - groups['dhcp'] | length == 2
          - kea_dhcp4_subnet is defined
          - kea_dhcp4_pool is defined
          - kea_dhcp4_router is defined
          - hostvars[groups['dhcp'][0]].ansible_host is defined
          - hostvars[groups['dhcp'][1]].ansible_host is defined
        fail_msg: >-
          Kea DHCPv4 hot-standby を有効にするには dhcp グループを 2 台で定義し、
          kea_dhcp4_subnet / kea_dhcp4_pool / kea_dhcp4_router を設定してください。
      when:
        - kea_dhcp4_enable | default(false) | bool
        - inventory_hostname in groups.get('dhcp', [])

    - name: Kea DHCPv4 設定を配置する
      ansible.builtin.template:
        src: ../svc/kea/config/kea-dhcp4.conf.j2
        dest: /opt/svc/kea/config/kea-dhcp4.conf
        owner: root
        group: root
        mode: '0644'
      when:
        - kea_dhcp4_enable | default(false) | bool
        - inventory_hostname in groups.get('dhcp', [])
      notify: Restart kea-dhcp4

    - name: Kea DHCPv4 のイメージを pull する
      community.docker.docker_compose_v2_pull:
        project_src: /opt/svc/kea
      when:
        - kea_dhcp4_enable | default(false) | bool
        - inventory_hostname in groups.get('dhcp', [])

    - name: Kea DHCPv4 が起動中か確認する
      ansible.builtin.command: docker compose ps --status running -q
      args:
        chdir: /opt/svc/kea
      register: kea_dhcp4_running
      changed_when: false
      failed_when: false
      when:
        - kea_dhcp4_enable | default(false) | bool
        - inventory_hostname in groups.get('dhcp', [])

    - name: Kea DHCPv4 を起動する
      community.docker.docker_compose_v2:
        project_src: /opt/svc/kea
        state: present
      when:
        - kea_dhcp4_enable | default(false) | bool
        - inventory_hostname in groups.get('dhcp', [])
        - (kea_dhcp4_running.stdout | trim) == ""

- name: スタブリゾルバを無効化して coredns で名前解決する
  hosts: "sh"
  become: yes
  tasks:
    - name: systemd-resolved を無効化し、停止する
      ansible.builtin.systemd:
        name: systemd-resolved
        enabled: no
        state: stopped
    
    - name: coredns が起動中か確認する
      ansible.builtin.command: docker compose ps --status running -q
      args:
        chdir: /opt/svc/coredns
      register: coredns_running
      changed_when: false
      failed_when: false

    - name: coredns を再起動する（すでに起動している場合）
      community.docker.docker_compose_v2:
        project_src: /opt/svc/coredns
        state: restarted
      when:
        - (coredns_running.stdout | trim) != ""

    - name: coredns を起動する（まだ起動していない場合）
      community.docker.docker_compose_v2:
        project_src: /opt/svc/coredns
        state: present
      when:
        - (coredns_running.stdout | trim) == ""

    - name: /etc/resolv.conf にシンボリックリンクがあれば削除する
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent
        force: yes

    - name: キャッシュ DNS サーバの宛先を 127.0.0.1 (CoreDNS) に向ける
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 127.0.0.1
        owner: root
        group: root
        mode: '0644'
